---
# ═══════════════════════════════════════════════════════════════════════════════
# Disaster-Recovery Playbook
# Run after: terraform apply
# Purpose : idempotently (re)install every managed service inside each LXC.
# All community-script tasks use `creates:` guards — safe to re-run on live
# containers (skipped if the app binary/directory already exists).
# ═══════════════════════════════════════════════════════════════════════════════

# ── 0. Bootstrap – wait for SSH and ensure curl is present ────────────────────
- name: Bootstrap all containers
  hosts: all_containers
  become: yes
  gather_facts: no
  tasks:
    - name: Wait for SSH to become available
      wait_for_connection:
        delay: 5
        timeout: 120

    - name: Gather facts
      setup:

    - name: Ensure curl and ca-certificates are installed
      apt:
        name:
          - curl
          - ca-certificates
        state: present
        update_cache: yes

# ── 1. Redis ──────────────────────────────────────────────────────────────────
- name: Install and configure Redis
  hosts: redis_nodes
  become: yes
  tasks:
    - name: Install redis-server
      apt:
        name: redis-server
        state: present

    - name: Ensure Redis is started and enabled
      systemd:
        name: redis-server
        state: started
        enabled: yes

# ── 2. Grafana ────────────────────────────────────────────────────────────────
- name: Install and configure Grafana
  hosts: grafana_nodes
  become: yes
  environment:
    DEBIAN_FRONTEND: noninteractive
  tasks:
    - name: Install Grafana via community script
      shell: |
        bash <(curl -fsSL https://raw.githubusercontent.com/community-scripts/ProxmoxVE/main/install/grafana-install.sh)
      args:
        creates: /usr/sbin/grafana-server

    - name: Ensure Grafana is started and enabled
      systemd:
        name: grafana-server
        state: started
        enabled: yes
        daemon_reload: yes

