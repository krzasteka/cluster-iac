[defaults]
inventory        = inventory.ini
remote_user      = root
host_key_checking = False
stdout_callback  = ansible.builtin.default
callback_result_format = yaml
# Wait up to 2 minutes for fresh containers to accept SSH
timeout          = 120

[ssh_connection]
ssh_args    = -o IgnoreUnknown=UseKeychain -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o GlobalKnownHostsFile=/dev/null
pipelining  = True
